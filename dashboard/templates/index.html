<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3347;
            --text: #e8eaf0;
            --muted: #6b7280;
            --accent: #6366f1;
            --accent-h: #4f52d9;
            --green: #10b981;
            --yellow: #f59e0b;
            --red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Layout */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: .6rem;
        }

        header h1 i {
            color: var(--accent);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media(max-width:700px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
        }

        .card-title {
            font-size: .8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        /* Stats */
        .stat-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: .75rem;
        }

        .stat {
            background: var(--surface2);
            border-radius: 8px;
            padding: .9rem .75rem;
            text-align: center;
        }

        .stat-val {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: .7rem;
            color: var(--muted);
            margin-top: .2rem;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: .2rem .65rem;
            border-radius: 6px;
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .04em;
        }

        .badge-green {
            background: rgba(16, 185, 129, .15);
            color: var(--green);
        }

        .badge-yellow {
            background: rgba(245, 158, 11, .15);
            color: var(--yellow);
        }

        .badge-red {
            background: rgba(239, 68, 68, .15);
            color: var(--red);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .45rem .9rem;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-family: inherit;
            font-size: .82rem;
            cursor: pointer;
            transition: all .18s;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-primary {
            background: var(--surface2);
            border-color: var(--border);
            color: var(--text);
            font-weight: 500;
        }

        .btn-primary:hover {
            background: var(--surface2);
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-icon {
            padding: .4rem .55rem;
        }

        .btn-danger:hover {
            border-color: var(--red);
            color: var(--red);
        }

        /* Controls */
        .controls-row {
            display: flex;
            gap: .75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Session list */
        .session-item {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 1rem;
            padding: 1.1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .session-item:last-child {
            border-bottom: none;
        }

        .session-name {
            font-weight: 600;
            font-size: .92rem;
        }

        .session-meta {
            font-size: .75rem;
            color: var(--muted);
            margin-top: .3rem;
            font-family: monospace;
            word-break: break-all;
        }

        .session-actions {
            display: flex;
            gap: .4rem;
            align-items: center;
            flex-shrink: 0;
        }

        /* Add session form */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem;
            margin-top: 1rem;
        }

        .form-group label {
            display: block;
            font-size: .75rem;
            color: var(--muted);
            margin-bottom: .3rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: .5rem .7rem;
            border: 1px solid var(--border);
            border-radius: 7px;
            background: var(--surface2);
            color: var(--text);
            font-family: inherit;
            font-size: .85rem;
            transition: border-color .18s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-full {
            grid-column: 1 / -1;
        }

        /* Logs */
        .logs-box {
            background: #0a0c12;
            border-radius: 8px;
            padding: 1rem;
            height: 280px;
            overflow-y: auto;
            font-family: monospace;
            font-size: .78rem;
        }

        .log-sent {
            color: var(--green);
        }

        .log-failed {
            color: var(--red);
        }

        .log-queued {
            color: var(--yellow);
        }

        .log-alert {
            color: var(--red);
            font-weight: bold;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .65);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.75rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, .5);
            animation: pop .18s ease;
        }

        @keyframes pop {
            from {
                transform: scale(.94);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .modal-title i {
            color: var(--accent);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: .6rem;
            margin-top: 1.25rem;
        }

        .modal-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem;
        }

        /* Theme toggle */
        .theme-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: .4rem .6rem;
            border-radius: 7px;
            cursor: pointer;
            font-size: .95rem;
            transition: all .18s;
        }

        .theme-btn:hover {
            color: var(--text);
            border-color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fa-solid fa-bullhorn"></i> Marketing Dashboard</h1>
        </header>

        <!-- Stats + Controls -->
        <div class="grid-2">
            <div class="card">
                <div class="card-title"><i class="fa-solid fa-chart-pie"></i> Overview</div>
                <div class="stat-row" id="overviewStats">
                    <div class="stat">
                        <div class="stat-val">—</div>
                        <div class="stat-label">Sent</div>
                    </div>
                    <div class="stat">
                        <div class="stat-val">—</div>
                        <div class="stat-label">Queued</div>
                    </div>
                    <div class="stat">
                        <div class="stat-val">—</div>
                        <div class="stat-label">Failed</div>
                    </div>
                    <div class="stat">
                        <div class="stat-val">—</div>
                        <div class="stat-label">Suspended</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-title"><i class="fa-solid fa-sliders"></i> Controls</div>
                <div class="controls-row">
                    <button class="btn btn-primary" onclick="triggerRun()"><i class="fa-solid fa-bolt"></i> Run
                        Now</button>
                    <button class="btn" id="pauseBtn" onclick="togglePause()"><i class="fa-solid fa-pause"></i>
                        Pause</button>
                    <span class="badge badge-yellow" id="schedulerStatus">Loading…</span>
                </div>
            </div>
        </div>

        <!-- Sessions + Messages -->
        <div class="grid-2">
            <div class="card">
                <div class="card-title"><i class="fa-solid fa-mobile-screen"></i> WhatsApp Sessions</div>
                <div id="sessionsList">
                    <div style="color:var(--muted);font-size:.85rem;">Loading…</div>
                </div>
                <hr style="border:0;border-top:1px solid var(--border);margin:1rem 0;">
                <div class="card-title" style="margin-bottom:.75rem;"><i class="fa-solid fa-plus"></i> Add Session</div>
                <div class="modal-form-grid" style="gap:.65rem;">
                    <div class="form-group">
                        <label>Custom Name (optional)</label>
                        <input type="text" id="newName">
                    </div>
                    <div class="form-group">
                        <label>Country</label>
                        <input type="text" id="newCountry">
                    </div>
                    <div class="form-group">
                        <label>Country Code</label>
                        <input type="text" id="newCountryCode">
                    </div>
                    <div class="form-group">
                        <label>Session ID</label>
                        <input type="text" id="newSessionId">
                    </div>
                </div>
                <button class="btn btn-primary" style="margin-top:.9rem;width:100%;" onclick="addSession()"><i
                        class="fa-solid fa-plus"></i> Add Session</button>
            </div>

            <div class="card" style="display:flex;flex-direction:column;">
                <div class="card-title"><i class="fa-solid fa-envelope"></i> Message Template</div>
                <div class="form-group">
                    <label>Country</label>
                    <select id="messageCountrySelect" onchange="loadMessage()">
                        <option value="default">Default Message</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1;display:flex;flex-direction:column;">
                    <label>Message</label>
                    <textarea id="messageEditor" placeholder="Loading…"
                        style="flex:1;resize:vertical;min-height:180px;"></textarea>
                </div>
                <button class="btn btn-primary" onclick="saveMessage()" style="width:100%;margin-top:.75rem;"><i
                        class="fa-solid fa-floppy-disk"></i> Save Message</button>
            </div>
        </div>

        <!-- Logs -->
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-terminal"></i> Logs</div>
            <div class="logs-box" id="logsContainer">Loading…</div>
        </div>
    </div>

    <!-- Edit Session Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-title"><i class="fa-solid fa-pen-to-square"></i> Edit Session</div>
            <input type="hidden" id="editOldSessionId">
            <div class="modal-form-grid">
                <div class="form-group form-full">
                    <label>Custom Name <span style="color:var(--muted);font-weight:400;">(leave blank to use country
                            name)</span></label>
                    <input type="text" id="editName" placeholder="Optional display name">
                </div>
                <div class="form-group">
                    <label>Country</label>
                    <input type="text" id="editCountry" placeholder="Nicaragua">
                </div>
                <div class="form-group">
                    <label>Country Code</label>
                    <input type="text" id="editCountryCode" placeholder="ni">
                </div>
                <div class="form-group form-full">
                    <label>Session ID</label>
                    <input type="text" id="editSessionId" placeholder="session-ni">
                </div>
                <div class="form-group form-full">
                    <label>Status</label>
                    <select id="editActive">
                        <option value="true">Active</option>
                        <option value="false">Suspended</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEdit()"><i class="fa-solid fa-check"></i> Save</button>
            </div>
        </div>
    </div>

    <script>
        // ── Theme ─────────────────────────────────────────────
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
            const next = isDark ? 'light' : 'dark';
            applyTheme(next);
            localStorage.setItem('theme', next);
        }
        function applyTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
            const btn = document.getElementById('themeBtn');
            if (t === 'light') {
                document.body.style.setProperty('background', '#f3f4f6');
                btn.innerHTML = '<i class="fa-solid fa-moon"></i>';
            } else {
                document.body.style.removeProperty('background');
                btn.innerHTML = '<i class="fa-solid fa-sun"></i>';
            }
        }
        (function () {
            const saved = localStorage.getItem('theme');
            if (saved === 'light') applyTheme('light');
        })();

        // ── Overview ──────────────────────────────────────────
        async function fetchOverview() {
            try {
                const d = await fetch('/api/overview').then(r => r.json());
                document.getElementById('overviewStats').innerHTML = `
            <div class="stat"><div class="stat-val" style="color:var(--green)">${d.sent}</div><div class="stat-label">Sent</div></div>
            <div class="stat"><div class="stat-val" style="color:var(--yellow)">${d.queued}</div><div class="stat-label">Queued</div></div>
            <div class="stat"><div class="stat-val" style="color:var(--red)">${d.failed}</div><div class="stat-label">Failed</div></div>
            <div class="stat"><div class="stat-val">${d.suspended_sessions}</div><div class="stat-label">Suspended</div></div>`;
            } catch (e) { }
        }

        // ── Status ────────────────────────────────────────────
        async function fetchStatus() {
            try {
                const d = await fetch('/api/status').then(r => r.json());
                const badge = document.getElementById('schedulerStatus');
                const btn = document.getElementById('pauseBtn');
                if (d.paused) {
                    badge.className = 'badge badge-yellow'; badge.textContent = 'Paused';
                    btn.innerHTML = '<i class="fa-solid fa-play"></i> Resume';
                } else {
                    badge.className = 'badge badge-green'; badge.textContent = 'Active';
                    btn.innerHTML = '<i class="fa-solid fa-pause"></i> Pause';
                }
            } catch (e) { }
        }

        // ── Sessions ──────────────────────────────────────────
        async function fetchSessions() {
            try {
                const d = await fetch('/api/sessions').then(r => r.json());
                const list = document.getElementById('sessionsList');
                const select = document.getElementById('messageCountrySelect');
                const prev = select.value;
                select.innerHTML = '<option value="default">Default Message</option>';
                list.innerHTML = '';

                if (!d.sessions || d.sessions.length === 0) {
                    list.innerHTML = '<div style="color:var(--muted);font-size:.85rem;padding:.5rem 0;">No sessions yet.</div>';
                    return;
                }

                d.sessions.forEach(s => {
                    const status = s.status || 'UNKNOWN';
                    // READY maps to "Active", everything else is title-cased
                    const statusLabel = status === 'READY' ? 'Active'
                        : status.charAt(0).toUpperCase() + status.slice(1).toLowerCase();
                    let bclass = 'badge-yellow';
                    if (status === 'READY') bclass = 'badge-green';
                    if (['SUSPENDED', 'BANNED', 'OFFLINE', 'DISCONNECTED'].includes(status)) bclass = 'badge-red';

                    const displayName = s.name || s.country;

                    list.innerHTML += `
            <div class="session-item">
                <div style="min-width:0;overflow:hidden;">
                    <div class="session-name">${displayName} <span style="color:var(--muted);font-weight:400;">(${s.country_code})</span></div>
                    <div class="session-meta">${s.session_id}</div>
                </div>
                <div class="session-actions">
                    <span class="badge ${bclass}">${statusLabel}</span>
                    <button class="btn btn-icon" onclick="openEditModal('${s.session_id}','${(s.name || '').replace(/'/g, "\\'")}','${s.country.replace(/'/g, "\\'")}','${s.country_code}',${s.active})" title="Edit"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-icon btn-danger" onclick="deleteSession('${s.session_id}')" title="Delete"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>`;

                    select.innerHTML += `<option value="${s.country_code}">${displayName}</option>`;
                });

                if (prev) select.value = prev;
            } catch (e) { }
        }

        async function addSession() {
            const name = document.getElementById('newName').value.trim();
            const country = document.getElementById('newCountry').value.trim();
            const country_code = document.getElementById('newCountryCode').value.trim();
            const session_id = document.getElementById('newSessionId').value.trim();
            if (!country || !country_code || !session_id) return alert('Country, country code, and session ID are required.');
            await fetch('/api/sessions', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, country, country_code, session_id, active: true })
            });
            ['newName', 'newCountry', 'newCountryCode', 'newSessionId'].forEach(id => document.getElementById(id).value = '');
            fetchSessions();
        }

        async function restartSession(id) {
            await fetch(`/api/sessions/${id}/start`, { method: 'POST' });
            alert('Reconnect request sent.');
        }

        async function deleteSession(id) {
            if (!confirm('Delete this session? This cannot be undone.')) return;
            await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
            fetchSessions();
        }

        // ── Edit Modal ────────────────────────────────────────
        function openEditModal(sessionId, name, country, countryCode, active) {
            document.getElementById('editOldSessionId').value = sessionId;
            document.getElementById('editName').value = name;
            document.getElementById('editCountry').value = country;
            document.getElementById('editCountryCode').value = countryCode;
            document.getElementById('editSessionId').value = sessionId;
            document.getElementById('editActive').value = active ? 'true' : 'false';
            document.getElementById('editModal').classList.add('open');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('open');
        }

        async function saveEdit() {
            const oldId = document.getElementById('editOldSessionId').value;
            const name = document.getElementById('editName').value.trim();
            const country = document.getElementById('editCountry').value.trim();
            const country_code = document.getElementById('editCountryCode').value.trim();
            const session_id = document.getElementById('editSessionId').value.trim();
            const active = document.getElementById('editActive').value === 'true';
            if (!country || !country_code || !session_id) return alert('Country, country code, and session ID are required.');
            await fetch(`/api/sessions/${oldId}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, country, country_code, session_id, active })
            });
            closeEditModal();
            fetchSessions();
        }

        // Close modal on overlay click
        document.getElementById('editModal').addEventListener('click', function (e) {
            if (e.target === this) closeEditModal();
        });

        // ── Messages ──────────────────────────────────────────
        async function loadMessage() {
            const cc = document.getElementById('messageCountrySelect').value;
            const d = await fetch(`/api/messages/${cc}`).then(r => r.json());
            document.getElementById('messageEditor').value = d.text;
        }

        async function saveMessage() {
            const cc = document.getElementById('messageCountrySelect').value;
            const text = document.getElementById('messageEditor').value;
            await fetch(`/api/messages/${cc}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });
            alert('Message saved.');
        }

        // ── Controls ──────────────────────────────────────────
        async function triggerRun() {
            await fetch('/api/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'run' }) });
            alert('Run triggered.');
        }

        async function togglePause() {
            const paused = document.getElementById('schedulerStatus').textContent.includes('Paused');
            await fetch('/api/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: paused ? 'resume' : 'pause' }) });
            fetchStatus();
        }

        // ── Logs ──────────────────────────────────────────────
        async function fetchLogs() {
            try {
                const d = await fetch('/api/logs').then(r => r.json());
                const box = document.getElementById('logsContainer');
                if (!d.logs || d.logs.length === 0) { box.textContent = 'No logs yet.'; return; }
                box.innerHTML = d.logs.map(line => {
                    let cls = '';
                    if (line.includes('Sent message')) cls = 'log-sent';
                    else if (line.includes('Failed')) cls = 'log-failed';
                    else if (line.includes('Queued')) cls = 'log-queued';
                    else if (line.includes('Alert:') || line.includes('CRITICAL')) cls = 'log-alert';
                    return `<div class="${cls}">${line}</div>`;
                }).join('');
                box.scrollTop = box.scrollHeight;
            } catch (e) { }
        }

        // ── Init ──────────────────────────────────────────────
        fetchOverview(); fetchSessions(); fetchStatus(); loadMessage(); fetchLogs();
        setInterval(fetchOverview, 5000);
        setInterval(fetchStatus, 5000);
        setInterval(fetchLogs, 5000);
        setInterval(fetchSessions, 10000);
    </script>
</body>

</html>
