version: "3.8"

services:
  openwa:
    build:
      context: ./OpenWA
      dockerfile: Dockerfile
    container_name: openwa-api
    ports:
      - "2785:2785"
    environment:
      - NODE_ENV=development
      - PORT=2785
      - DATABASE_TYPE=sqlite
      - DATABASE_NAME=/app/data/openwa.sqlite
      - DATABASE_SYNCHRONIZE=true
      - ENGINE_TYPE=whatsapp-web.js
      - SESSION_DATA_PATH=/app/data/sessions
      - PUPPETEER_HEADLESS=true
      - PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/data/media
      - WEBHOOK_URL=http://dashboard:5001/webhook/session
    volumes:
      - ./OpenWA/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:2785/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  dashboard:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: marketing-dashboard
    ports:
      - "5001:5001"
    volumes:
      - ./backend/api/app.py:/app/app.py
      - ./backend/api/templates:/app/templates
      - ./backend/api/static:/app/static

      - ./backend/worker:/worker
      - ./backend/scheduler:/scheduler
      - ./backend/post_processing:/post_processing
      - ./backend/config:/config
      - ./backend/db:/db

      - ./scraper.py:/scraper.py
      - ./scraper:/scraper
      - ./.env:/.env

      - /run/user/1000/podman/podman.sock:/run/podman/podman.sock
    environment:
      - CONTAINER_HOST=unix:///run/podman/podman.sock
    depends_on:
      openwa:
        condition: service_healthy
    restart: unless-stopped

  openwa-dashboard:
    build:
      context: ./OpenWA/dashboard
      dockerfile: Dockerfile
    container_name: openwa-dashboard
    ports:
      - "2886:80"
    depends_on:
      openwa:
        condition: service_healthy
    restart: unless-stopped
