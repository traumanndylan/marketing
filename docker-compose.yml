version: "3.8"

services:
  openwa:
    build:
      context: ./OpenWA
      dockerfile: Dockerfile
    container_name: openwa-api
    ports:
      - "2785:2785"
    environment:
      - NODE_ENV=development
      - PORT=2785
      - DATABASE_TYPE=sqlite
      - DATABASE_NAME=/app/data/openwa.sqlite
      - DATABASE_SYNCHRONIZE=true
      - ENGINE_TYPE=whatsapp-web.js
      - SESSION_DATA_PATH=/app/data/sessions
      - PUPPETEER_HEADLESS=true
      - PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/data/media
      - WEBHOOK_URL=http://dashboard:5001/webhook/session
    volumes:
      - ./OpenWA/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:2785/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  dashboard:
    build:
      context: ./programs/dashboard
      dockerfile: Dockerfile
    container_name: homeserver-dashboard
    ports:
      - "5001:5001"
    volumes:
      - ./programs/main:/home/dylan/marketing/programs/main
      - ./programs/cron:/home/dylan/marketing/programs/cron
      - ./programs/postProcessing:/home/dylan/marketing/programs/postProcessing
      - ./programs/queries:/home/dylan/marketing/programs/queries
      - ./programs/db:/home/dylan/marketing/programs/db
      - ./programs/dashboard/templates:/app/templates
    depends_on:
      openwa:
        condition: service_healthy
    restart: unless-stopped

  openwa-dashboard:
    build:
      context: ./OpenWA/dashboard
      dockerfile: Dockerfile
    container_name: openwa-dashboard
    ports:
      - "2886:80"
    depends_on:
      openwa:
        condition: service_healthy
    restart: unless-stopped
