{% extends "base.html" %}

{% block content %}
<div class="grid-2">
    <div class="card" style="display:flex;flex-direction:column;">
        <div class="card-title"><i class="fa-solid fa-list"></i> Scraper Configuration</div>
        <div class="form-row" style="margin-top:0; margin-bottom:1rem;">
            <div class="form-group form-full">
                <label>File to Edit</label>
                <select id="configFileSelect" onchange="loadConfigFile()">
                    <option value="cities.txt">cities.txt (Locations)</option>
                    <option value="types.txt">types.txt (Search Queries)</option>
                    <option value="categories.json">categories.json (Business Categories)</option>
                </select>
            </div>
        </div>
        <div class="form-group" style="flex:1;display:flex;flex-direction:column;">
            <textarea id="configEditor" placeholder="Loading…"
                style="flex:1;resize:vertical;min-height:180px;"></textarea>
        </div>
        <button class="btn btn-primary" onclick="saveConfigFile()" style="width:100%;margin-top:.75rem;"><i
                class="fa-solid fa-floppy-disk"></i> Save File</button>
    </div>

    <div class="card" style="display:flex;flex-direction:column;">
        <div class="card-title"><i class="fa-solid fa-robot"></i> Scraper Execution</div>
        <div class="form-group">
            <label>Target Machine</label>
            <select id="scraperMachineSelect">
                <option value="local">Local Machine</option>
                <option value="cloud">Cloud Server (env: SERVER_IP)</option>
            </select>
        </div>
        <div class="form-group" id="cloudServerIpGroup" style="margin-top:.75rem; display:none;">
            <label>Cloud Server IP</label>
            <input type="text" id="cloudServerIp" placeholder="e.g. 192.168.1.100">
            <button class="btn btn-primary" onclick="saveServerIp()" style="margin-top:.5rem;"><i
                    class="fa-solid fa-save"></i> Save IP</button>
        </div>
        <div style="display:flex; gap:1rem; margin-top:1.5rem;">
            <button class="btn btn-primary" onclick="runScraper()" style="flex:1;"><i class="fa-solid fa-play"></i> Run
                Scraper</button>
            <button class="btn" onclick="stopScraper()"
                style="flex:1; background:var(--alert); color:white; border:none;"><i class="fa-solid fa-stop"></i> Stop
                Scraper</button>
        </div>

        <div style="margin-top:1rem; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <div style="font-size: .8rem; color: var(--muted); margin-bottom: .25rem;">ETA</div>
                <div id="scraperEta"
                    style="font-size: 1.2rem; font-weight: 600; color: var(--accent); min-width: 80px;">--:--</div>
            </div>
            <div style="flex:1; margin-left: 1.5rem;">
                <div
                    style="font-size: .8rem; color: var(--muted); margin-bottom: .4rem; display:flex; justify-content:space-between;">
                    <span>Progress</span>
                    <span id="scraperProgressText">0%</span>
                </div>
                <div style="height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden;">
                    <div id="scraperProgressBar"
                        style="height: 100%; width: 0%; background: var(--green); transition: width 0.3s ease;"></div>
                </div>
            </div>
        </div>

        <div style="margin-top:1rem; flex:1; display:flex; flex-direction:column;">
            <div
                style="font-size: .8rem; color: var(--muted); margin-bottom: .25rem; display:flex; justify-content:space-between; align-items:center;">
                <span>Scraper Logs</span>
                <button class="btn" onclick="clearLogs('scraper')"
                    style="padding: 0.2rem 0.6rem; font-size: 0.75rem;"><i class="fa-solid fa-trash"></i> Clear</button>
            </div>
            <div class="logs-box" id="scraperLogsContainer" style="height:150px; font-size:0.75rem;">Waiting for scraper
                to start...</div>
        </div>
    </div>
</div>
{% endblock %}
