<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsvectormap/dist/css/jsvectormap.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/jsvectormap"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsvectormap/dist/maps/world.js"></script>
    <script src="{{ url_for('static', filename='assets/us-aea-en.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/styles.css') }}?v=3">
    <style>
        .navbar {
            background: var(--surface);
            padding: 1rem 2rem;
            display: flex;
            gap: 1.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .navbar a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .navbar a:hover,
        .navbar a.active {
            color: var(--text);
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <p id="confirmMessage">Are you sure?</p>
            <div class="modal-footer">
                <button class="btn" onclick="confirmResolve(false)">Cancel</button>
                <button class="btn btn-primary" onclick="confirmResolve(true)"><i class="fa-solid fa-check"></i>
                    Confirm</button>
            </div>
        </div>
    </div>

    <div class="navbar">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}"><i class="fa-solid fa-chart-pie"></i>
            Overview</a>
        <a href="/sessions" class="{% if request.path == '/sessions' %}active{% endif %}"><i
                class="fa-solid fa-mobile-screen"></i> Sessions</a>
        <a href="/generator" class="{% if request.path == '/generator' %}active{% endif %}"><i
                class="fa-solid fa-earth-americas"></i> Map</a>
        <a href="/scraper" class="{% if request.path == '/scraper' %}active{% endif %}"><i
                class="fa-solid fa-robot"></i> Scraper</a>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block modals %}{% endblock %}

    <script src="{{ url_for('static', filename='assets/scripts.js') }}?v=12"></script>
</body>

</html>
