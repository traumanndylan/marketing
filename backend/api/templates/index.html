{% extends "base.html" %}

{% block content %}
<div class="grid-2">
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-chart-pie"></i> Overview</div>
        <div class="stat-row" id="overviewStats" style="margin-bottom: 1rem;">
            <div class="stat">
                <div class="stat-val">—</div>
                <div class="stat-label">Sent</div>
            </div>
            <div class="stat">
                <div class="stat-val">—</div>
                <div class="stat-label">Queued</div>
            </div>
            <div class="stat">
                <div class="stat-val">—</div>
                <div class="stat-label">Failed</div>
            </div>
            <div class="stat">
                <div class="stat-val">—</div>
                <div class="stat-label">Skipped</div>
            </div>
        </div>
        <div style="font-size: .8rem; color: var(--muted); margin-bottom: .5rem;">Lead Database Stats</div>
        <div class="stat-row" id="leadsStats">
            <div class="stat" style="grid-column: span 4;">
                <div class="stat-val" style="font-size: 1.2rem;">—</div>
                <div class="stat-label">Total Contacts</div>
            </div>
        </div>
        <div id="countryStats"
            style="margin-top: .5rem; font-size: .75rem; color: var(--muted); max-height: 80px; overflow-y: auto;">
        </div>
    </div>
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-sliders"></i> Controls</div>
        <div class="controls-row" style="margin-bottom: 1.5rem; align-items: center;">
            <button class="btn btn-primary" onclick="triggerRun()"><i class="fa-solid fa-bolt"></i> Run Now</button>
            <button class="btn" id="pauseBtn" onclick="togglePause()"><i class="fa-solid fa-pause"></i> Pause</button>
            <span class="badge badge-yellow" id="schedulerStatus" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">Loading…</span>
        </div>
        <div style="display: flex; align-items: flex-end; gap: 1rem;">
            <div class="form-group" style="flex: 1; max-width: 200px;">
                <label>Message Limit / Session</label>
                <input type="number" id="globalMessageLimit" min="1" placeholder="15">
            </div>
            <button class="btn btn-primary" onclick="saveMessageLimit()" style="height: 36px; padding: 0 1.2rem;"><i class="fa-solid fa-save"></i> Save</button>
        </div>
    </div>
</div>

<div class="card" style="margin-top:1.5rem;">
    <div class="card-title" style="display:flex; justify-content:space-between; align-items:center;">
        <span><i class="fa-solid fa-terminal"></i> Logs</span>
        <button class="btn" onclick="clearLogs('main')" style="padding: 0.2rem 0.5rem; font-size: 0.75rem;"><i class="fa-solid fa-trash"></i> Clear</button>
    </div>
    <div class="logs-box" id="logsContainer" style="height:270px;">Loading…</div>
</div>
{% endblock %}
