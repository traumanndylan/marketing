{% extends "base.html" %}

{% block content %}
<div class="card" style="margin-bottom:1.5rem; display:flex; flex-direction:column;">
    <div class="card-title" style="display:flex; justify-content:space-between; align-items:center;">
        <span><i class="fa-solid fa-earth-americas"></i> City List Generator</span>
        <select id="mapRegionSelect" onchange="changeMapRegion()"
            style="width:150px; padding:0.3rem; font-size:0.8rem;">
            <option value="world">World</option>
            <option value="us_aea_en">United States</option>
        </select>
    </div>
    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:1.5rem;">
        <div id="worldMap"
            style="width: 100%; height: 400px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border);">
        </div>
        <div style="display:flex; flex-direction:column; gap:1rem;">
            <div>
                <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:.5rem;">Selected Countries</label>
                <div id="selectedCountriesList"
                    style="font-size:.85rem;color:var(--text);background:var(--surface2);padding:.75rem;border-radius:7px;min-height:60px;max-height:150px;overflow-y:auto;border: 1px solid var(--border);">
                    None</div>
            </div>
            <div>
                <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:.5rem;">Population Cutoff: <span id="popVal" style="color:var(--accent);font-weight:600;">50,000</span></label>
                <input type="range" id="popSlider" min="5000" max="500000" step="5000" value="50000"
                    style="width:100%; cursor:pointer;"
                    oninput="document.getElementById('popVal').innerText=parseInt(this.value).toLocaleString()">
            </div>
            <button class="btn btn-primary" id="genCitiesBtn" onclick="generateCities()"
                style="margin-top:auto;"><i class="fa-solid fa-wand-magic-sparkles"></i> Generate List</button>
        </div>
    </div>
</div>
{% endblock %}
